<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>From your Cutie Pie ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      color: white;
    }

    .message {
      font-size: 2.5rem;
      opacity: 0;
      transform: scale(0.5);
      animation: popIn 2s ease forwards;
    }

    @keyframes popIn {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }
      70% {
        transform: scale(1.1);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .heart {
      font-size: 3rem;
      animation: heartbeat 1s infinite;
    }

    @keyframes heartbeat {
      0% { transform: scale(1); }
      25% { transform: scale(1.2); }
      50% { transform: scale(1); }
      75% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="message" id="text"></div>
    <div class="heart">❤️</div>
  </div>

  <script>
    const name = "Bujji ma"; // 👈 change this

    const text = `I love you, ${name} ❤️`;

    let i = 0;
    function typeEffect() {
      if (i < text.length) {
        document.getElementById("text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 80);
      }
    }

    setTimeout(typeEffect, 1000);
  </script>
</body>
</html>
